name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  backend-tests:
    name: Django Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/req.txt
      - name: Install dependencies
        run: pip install -r req.txt
      - name: Create default CV fixture
        run: |
          mkdir -p default_cvs
          echo '{"name":"Test","position":"Dev","email":"","contactInformation":"","address":"","socialMedia":[],"summary":[],"educations":[],"courses":[],"workExperience":[],"projects":[],"skills":[],"languages":[]}' > default_cvs/cv_1.json
      - name: Run migrations
        env:
          SECRET_KEY: ci-test-secret-key
          DEBUG: "True"
          ALLOWED_HOSTS: "localhost,127.0.0.1"
        run: python manage.py migrate
      - name: Run tests
        env:
          SECRET_KEY: ci-test-secret-key
          DEBUG: "True"
          ALLOWED_HOSTS: "localhost,127.0.0.1"
        run: python manage.py test auth_app api --verbosity=2
      - name: Check missing migrations
        env:
          SECRET_KEY: ci-test-secret-key
          DEBUG: "True"
        run: python manage.py makemigrations --check --dry-run

  frontend-build:
    name: Next.js Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        env:
          NEXT_PUBLIC_BACKEND_URL: https://ats-cracker-production.up.railway.app
          NEXT_PUBLIC_ALLOWED_ORIGIN: https://ats-cracker-206.vercel.app
        run: npm run build

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: All checks passed
        run: |
          echo "Backend tests: PASSED"
          echo "Frontend build: PASSED"
          echo "Railway and Vercel auto-deploying..."
          echo "Deployed at: $(date)"
